隆\",\"voiceCloneRules\":\"声音克隆功能使用规则\",\"voiceIdCopied\":\"音色ID已复制\",\"voiceIdTooltip\":\"音色ID：{id}\",\"copyVoiceId\":\"复制音色ID\",\"copyVoiceIdMenu\":\"复制Voice ID\",\"cloneNewVoice\":\"克隆新音色\",\"generateVoice\":\"生成音色\",\"createVoice\":\"创建音色\",\"saveVoice\":\"保存音色\",\"voiceRegister\":\"音色登记\",\"selectVoice\":\"选择音色\",\"switchVoice\":\"切换音色\",\"clickToSwitchVoice\":\"点击切换音色\",\"generateVoiceFailed\":\"生成音色失败，请重试\",\"voiceInfoIncomplete\":\"音色信息不完整，无法编辑\",\"voiceNotGeneratedYet\":\"音色尚未生成完成，请重试\",\"voiceMissingId\":\"音色记录缺少 id，无法删除\",\"noVoicesClone\":\"暂无可用音色，快去克隆你的新音色吧～\",\"noFavoriteVoices\":\"暂无收藏音色\",\"noVoiceData\":\"暂无音色数据\",\"searchMyVoices\":\"搜索我的音色\",\"searchFavoriteVoices\":\"搜索收藏音色\",\"searchVoiceLibrary\":\"搜索音色库\",\"deleteCurrentVoice\":\"删除当前音色？\",\"deleteVoiceConfirm\":\"您确定要删除这个音色吗？\\\"{name}\\\"，此操作无法撤销\",\"pleaseEnterVoiceName\":\"请输入音色名称\",\"pleaseSelectTag\":\"请选择标签\",\"selectGender\":\"请选择性别\",\"selectLanguage\":\"请选择语言\",\"selectAccent\":\"请选择口音\",\"selectAgeGroup\":\"请选择年龄\",\"recordStepHint\":\"朗读一段文字，即可克隆你的专属声音\",\"refreshText\":\"文本刷新\",\"readingContent\":\"需阅读内容：\",\"readPrompt1\":\"欢迎来到哩布TV的创作画布。你可以从一个简单想法开始，把图片、视频、音频、脚本和模型连接成完整流程。每个节点代表一次创作动作，每条连线代表素材和能力之间的关系。无论是生成分镜、制作短片，还是整理灵感，复杂的视频创作都可以变得更清晰、更自由。\",\"readPrompt2\":\"在哩布TV里，创作不只是等待一个生成结果，而是搭建一条可以反复修改的工作流。你可以上传参考图，选择模型，生成视频片段，再继续添加旁白、音乐和剪辑节点。如果某个画面不满意，只要回到对应节点重新调整，就能继续优化，而不用从头开始。\",\"readPrompt3\":\"夜色慢慢落下来，窗外的风吹过树梢，像是在轻轻翻动一本旧书。女孩坐在灯下，望着桌上的画纸，心里浮现出一个还没有讲完的故事。她知道，只要再勇敢一点，就能把脑海里的世界画出来，让那些沉睡的角色重新醒来。\",\"readPrompt4\":\"镜头缓缓推进，城市的灯光在雨夜中闪烁。主角站在街角，手里握着一张泛黄的照片，像是在等待一个迟迟没有出现的答案。此刻，所有声音都变得遥远，只有心跳格外清晰。他终于明白，有些旅程不是为了抵达，而是为了重新认识自己。\",\"readPrompt5\":\"今天我想记录一个很普通但很开心的下午。没有特别宏大的计划，只是出门走了走，买了一杯咖啡，看了一会儿云，也拍下了一些喜欢的画面。生活有时候就是这样，不一定每天都有惊喜，但只要认真感受，就能发现很多细小而温柔的瞬间。\",\"readPrompt6\":\"学习一个新工具时，不需要一开始就掌握所有功能。更好的方式，是先理解它能帮你解决什么问题。比如在视频创作中，我们可以先准备脚本和素材，再逐步生成画面、调整镜头、补充声音，最后完成剪辑。把复杂任务拆成步骤，学习就会轻松很多。\",\"readPrompt7\":\"欢迎收听今天的节目。我们常说灵感很重要，但真正让灵感变成作品的，往往是清晰的方法和持续的修改。一个想法刚出现时可能很模糊，但只要把它写下来，拆成几个步骤，再一点点完善，它就会慢慢变成可以被看见、被听见、被分享的内容。\",\"readPrompt8\":\"哩布TV希望成为创作者的视频工作台。它把图片生成、视频生成、音频处理和基础剪辑放在同一张画布中，让用户不需要在多个工具之间来回切换。你可以一边生成内容，一边调整流程，也可以随时复用历史素材，让创作过程更加连续、直观和高效。\",\"readPrompt9\":\"一个好的视频，往往不是一次生成出来的，而是在不断尝试中慢慢完成的。哩布TV让创作者可以把灵感、素材和模型组织成清晰的工作流，从第一张参考图，到最后一段成片，每一步都能被看见、被修改、被延展。让创作更自由，也让结果更可控。\",\"readPrompt10\":\"每一段影像背后，都藏着一个想被表达的故事。有人记录城市的变化，有人记录家庭的日常，也有人把想象中的世界做成画面。工具的意义，不只是提高效率，更是帮助创作者降低表达的门槛。只要愿意开始，一个普通的想法，也可能变成动人的作品。\",\"startRecording\":\"开始录音\",\"stopRecording\":\"停止录音\",\"recording\":\"录音中\",\"recordingWaveform\":\"录音声纹\",\"savingAudio\":\"正在保存…\",\"reRecordHint\":\"点击重新录制（停止后将替换原音频）\",\"recordAgreement\":\"开始录音即表示您已获得声音授权\",\"recordDurationRange\":\"录音时长需在10s～60s之间\",\"recordingSamples\":\"录音样本\",\"deleteRecordingSample\":\"删除录音样本\",\"pleaseRecordFirst\":\"请先录制音频样本\",\"uploadNotCompleted\":\"录音上传未完成，请稍后重试\",\"denoise\":\"去除噪声\",\"denoiseTooltip\":\"若您的音频存在背景噪声，开启这个功能可以提升人声清晰度。若音频质量已足够理想，建议关闭此功能，得到更好的克隆效果。\",\"denoiseDescription\":\"去除噪声说明\",\"voiceCloneAgreement\":\"我已阅读并同意《{rulesLink}》；我确认对所上传的声音样本具有充分、合法、必要的权利或授权，并同意将其用于使用声音克隆功能；我承诺不将本功能用于违法违规的目的或用途。\",\"pauseInsertTooltip\":\"在文中插入停顿，精准掌控音频节奏，支持选择预设时长或直接输入秒数\",\"pauseInsertLabel\":\"\u003c#\u003e 停顿\",\"fillerInsertTooltip\":\"点击插入或输入生动的语气词，让语音更具感染力 系统仅支持预设库内的语气词标签\",\"fillerInsertLabel\":\"() 语气词\",\"fillerLaughs\":\"笑声\",\"fillerChuckle\":\"轻笑\",\"fillerCoughs\":\"咳嗽\",\"fillerClearThroat\":\"清嗓子\",\"fillerGroans\":\"呻吟\",\"fillerBreath\":\"正常换气\",\"fillerPant\":\"喘气\",\"fillerInhale\":\"吸气\",\"fillerExhale\":\"呼气\",\"fillerGasps\":\"倒吸气\",\"fillerSniffs\":\"吸鼻子\",\"fillerSighs\":\"叹气\",\"fillerSnorts\":\"喷鼻息\",\"fillerBurps\":\"打嗝\",\"fillerLipSmacking\":\"咂嘴\",\"fillerHumming\":\"哼唱\",\"fillerHissing\":\"嘶嘶声\",\"fillerEmm\":\"嗯\",\"fillerWhistles\":\"口哨\",\"fillerSneezes\":\"喷嚏\",\"fillerCrying\":\"抽泣\",\"fillerApplause\":\"鼓掌\",\"selectScene\":\"选择场景\",\"cameraControl\":\"摄像机\",\"cameraEnabled\":\"已开启\",\"cameraDisabled\":\"已关闭\",\"cameraSwitchOn\":\"开启\",\"cameraSwitchOff\":\"关闭\",\"cameraLockedInPanoramaMode\":\"
